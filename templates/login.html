<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Buddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="hero">
    <div class="card">
      <h1>🎓 English Buddy</h1>
      <p>Enter your details to continue</p>

      <div id="alert-box"></div>

      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" placeholder="+258 84 000 0000" autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password <span style="font-weight:400;color:#94a3b8;">(admin only)</span></label>
        <input type="password" id="password" placeholder="Leave blank if not admin" />
      </div>
      <button class="btn btn-primary btn-block" id="login-btn" onclick="handleLogin()">Continue</button>

      <p class="text-muted mt-2" style="font-size:.85rem;text-align:center;">
        New user? <a href="#" onclick="showRegister()">Register &amp; Pay</a>
      </p>

      <!-- Register flow (hidden) -->
      <div id="register-section" style="display:none;margin-top:1.5rem;border-top:1px solid #e2e8f0;padding-top:1.5rem;">
        <h3>Create Account</h3>
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label for="reg-mobile">Mobile Number</label>
          <input type="tel" id="reg-mobile" placeholder="+258 84 000 0000" />
        </div>
        <div class="form-group">
          <label for="reg-method">Payment Method</label>
          <select id="reg-method">
            <option value="mpesa">M-Pesa</option>
            <option value="emola">e-Mola</option>
          </select>
        </div>
        <div class="form-group">
          <label for="reg-affiliate">Affiliate Code (optional)</label>
          <input type="text" id="reg-affiliate" placeholder="e.g. BUDDY2024" />
        </div>
        <button class="btn btn-primary btn-block" id="pay-btn" onclick="handleRegister()">Pay 10 MZN &amp; Register</button>
        <p class="text-muted mt-2" style="font-size:.85rem;text-align:center;">
          <a href="#" onclick="hideRegister()">← Back to login</a>
        </p>
      </div>

      <!-- Payment status (hidden) -->
      <div id="status-section" style="display:none;margin-top:1.5rem;text-align:center;">
        <div class="spinner"></div>
        <p id="status-msg">Processing payment…</p>
        <p class="text-muted" style="font-size:.8rem;">Reference: <code id="pay-ref"></code></p>
        <button class="btn btn-outline btn-block mt-2" onclick="checkStatus()">Check Status</button>
        <button class="btn btn-outline btn-block mt-1" onclick="hideRegister()">Back</button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    let paymentRef = null;

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    function showRegister() {
      document.getElementById('register-section').style.display = 'block';
      document.getElementById('status-section').style.display = 'none';
    }
    function hideRegister() {
      document.getElementById('register-section').style.display = 'none';
      document.getElementById('status-section').style.display = 'none';
    }

    async function handleLogin() {
      const mobile   = document.getElementById('mobile').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!mobile) return showAlert('alert-box', 'Please enter your mobile number.');
      setLoading('login-btn', true);
      try {
        const res = await API.post('/api/login', { mobile, password: password || null });
        localStorage.setItem('token', res.token);
        window.location.href = res.redirect || '/dashboard';
      } catch (e) {
        showAlert('alert-box', e.detail || 'Login failed. Please check your details.');
      } finally {
        setLoading('login-btn', false);
      }
    }

    async function handleRegister() {
      const name      = document.getElementById('reg-name').value.trim();
      const mobile    = document.getElementById('reg-mobile').value.trim();
      const method    = document.getElementById('reg-method').value;
      const affiliate = document.getElementById('reg-affiliate').value.trim();
      if (!name)   return showAlert('alert-box', 'Please enter your full name.');
      if (!mobile) return showAlert('alert-box', 'Please enter your mobile number.');
      setLoading('pay-btn', true);
      try {
        const payload = { name, mobile, method };
        if (affiliate) payload.affiliate_code = affiliate;
        const res = await API.post('/api/register/start-payment', payload);
        paymentRef = res.payment.reference;
        document.getElementById('pay-ref').textContent = paymentRef;
        document.getElementById('register-section').style.display = 'none';
        document.getElementById('status-section').style.display = 'block';
        if (res.payment.checkout_url) window.open(res.payment.checkout_url, '_blank');
        pollStatus();
      } catch (e) {
        showAlert('alert-box', e.detail || 'Payment initiation failed.');
      } finally {
        setLoading('pay-btn', false);
      }
    }

    async function checkStatus() {
      if (!paymentRef) return;
      try {
        const res = await API.post('/api/register/check-payment-status', { reference: paymentRef });
        document.getElementById('status-msg').textContent = 'Status: ' + res.status;
        if (res.status === 'success' && res.token) {
          localStorage.setItem('token', res.token);
          window.location.href = '/dashboard';
        }
      } catch (e) {
        showAlert('alert-box', e.detail || 'Could not check status.');
      }
    }

    function pollStatus() {
      let attempts = 0;
      const timer = setInterval(async () => {
        attempts++;
        if (attempts > 20) return clearInterval(timer);
        try {
          const res = await API.post('/api/register/check-payment-status', { reference: paymentRef });
          document.getElementById('status-msg').textContent = 'Status: ' + res.status;
          if (res.status === 'success' && res.token) {
            clearInterval(timer);
            localStorage.setItem('token', res.token);
            window.location.href = '/dashboard';
          }
        } catch (_) {}
      }, 5000);
    }
  </script>
</body>
</html>
