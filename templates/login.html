<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Buddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: .5rem;
      color: #1a1a1a;
    }
    .subtitle {
      color: #666;
      font-size: .9rem;
      margin-bottom: 1.75rem;
    }
    .input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .input:focus { border-color: #5b4bff; }
    .main-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #5b4bff, #4caf50);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .2s;
    }
    .main-btn:hover { opacity: .9; }
    .main-btn:disabled { opacity: .6; cursor: not-allowed; }
    .register-text {
      margin-top: 1.25rem;
      font-size: .875rem;
      color: #666;
    }
    .register-text a { color: #5b4bff; text-decoration: none; font-weight: 500; }
    .alert {
      padding: .75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: .875rem;
      text-align: left;
    }
    .alert-danger  { background: #fee2e2; color: #991b1b; }
    .alert-success { background: #d1fae5; color: #065f46; }

    /* Register section */
    .divider { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
    .register-section { text-align: left; }
    .register-section h3 { font-size: 1.1rem; margin-bottom: 1rem; color: #1a1a1a; }
    label { display: block; font-size: .8rem; font-weight: 600; color: #555; margin-bottom: .35rem; }
    select { width: 100%; padding: 14px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 1rem; font-family: inherit; margin-bottom: 1rem; outline: none; }
    .back-link { display: block; text-align: center; margin-top: 1rem; font-size: .875rem; color: #5b4bff; cursor: pointer; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #eee;
      border-top-color: #5b4bff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    code { background: #f3f4f6; padding: .2rem .4rem; border-radius: 4px; font-size: .85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Payment API</h1>
    <p class="subtitle">Secure payment processing and affiliate management system</p>

    <div id="alert-box"></div>

    <!-- Main login -->
    <div id="login-section">
      <input type="tel" id="mobile" class="input" placeholder="Mobile Number" autofocus />
      <input type="password" id="password" class="input" placeholder="Password (admin only)" />
      <button class="main-btn" id="login-btn" onclick="handleLogin()">Login</button>
      <p class="register-text">New user? <a href="#" onclick="showRegister()">Register &amp; Pay</a></p>
    </div>

    <!-- Register flow -->
    <div id="register-section" style="display:none;">
      <hr class="divider" />
      <div class="register-section">
        <h3>Create Account</h3>
        <label>Full Name</label>
        <input type="text" id="reg-name" class="input" placeholder="Your full name" />
        <label>Mobile Number</label>
        <input type="tel" id="reg-mobile" class="input" placeholder="+258 84 000 0000" />
        <label>Payment Method</label>
        <select id="reg-method">
          <option value="mpesa">M-Pesa</option>
          <option value="emola">e-Mola</option>
        </select>
        <label>Affiliate Code (optional)</label>
        <input type="text" id="reg-affiliate" class="input" placeholder="e.g. BUDDY2024" />
        <button class="main-btn" id="pay-btn" onclick="handleRegister()">Pay 10 MZN &amp; Register</button>
        <a class="back-link" onclick="hideRegister()">← Back to login</a>
      </div>
    </div>

    <!-- Payment status -->
    <div id="status-section" style="display:none;">
      <hr class="divider" />
      <div class="spinner"></div>
      <p id="status-msg" style="color:#444;font-size:.9rem;">Redirecting to payment…</p>
      <p style="font-size:.8rem;color:#888;margin-top:.5rem;">Reference: <code id="pay-ref"></code></p>
      <a class="back-link" onclick="hideRegister()">← Back to login</a>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    let paymentRef = null;

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    function showAlert(id, msg, type = 'danger') {
      document.getElementById(id).innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => { document.getElementById(id).innerHTML = ''; }, 6000);
    }

    function showRegister() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('register-section').style.display = 'block';
    }
    function hideRegister() {
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('register-section').style.display = 'none';
      document.getElementById('status-section').style.display = 'none';
    }

    async function handleLogin() {
      const mobile   = document.getElementById('mobile').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!mobile) return showAlert('alert-box', 'Please enter your mobile number.');
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Please wait…';
      try {
        const res = await API.post('/api/login', { mobile, password: password || null });
        localStorage.setItem('token', res.token);
        window.location.href = res.redirect || '/dashboard';
      } catch (e) {
        showAlert('alert-box', e.detail || 'Login failed. Please check your details.');
      } finally {
        btn.disabled = false; btn.textContent = 'Login';
      }
    }

    async function handleRegister() {
      const name      = document.getElementById('reg-name').value.trim();
      const mobile    = document.getElementById('reg-mobile').value.trim();
      const method    = document.getElementById('reg-method').value;
      const affiliate = document.getElementById('reg-affiliate').value.trim();
      if (!name)   return showAlert('alert-box', 'Please enter your full name.');
      if (!mobile) return showAlert('alert-box', 'Please enter your mobile number.');
      const btn = document.getElementById('pay-btn');
      btn.disabled = true; btn.textContent = 'Please wait…';
      try {
        const payload = { name, mobile, method };
        if (affiliate) payload.affiliate_code = affiliate;
        const res = await API.post('/api/register/start-payment', payload);
        paymentRef = res.payment.reference;
        document.getElementById('pay-ref').textContent = paymentRef;
        document.getElementById('register-section').style.display = 'none';
        document.getElementById('status-section').style.display = 'block';
        if (res.payment.checkout_url) {
          window.location.href = res.payment.checkout_url;
        } else {
          pollStatus();
        }
      } catch (e) {
        showAlert('alert-box', e.detail || 'Payment initiation failed.');
      } finally {
        btn.disabled = false; btn.textContent = 'Pay 10 MZN & Register';
      }
    }

    async function checkStatus() {
      if (!paymentRef) return;
      try {
        const res = await API.post('/api/register/check-payment-status', { reference: paymentRef });
        document.getElementById('status-msg').textContent = 'Status: ' + res.status;
        if (res.status === 'success' && res.token) {
          localStorage.setItem('token', res.token);
          window.location.href = '/dashboard';
        }
      } catch (e) {
        showAlert('alert-box', e.detail || 'Could not check status.');
      }
    }

    function pollStatus() {
      let attempts = 0;
      const timer = setInterval(async () => {
        attempts++;
        if (attempts > 20) return clearInterval(timer);
        try {
          const res = await API.post('/api/register/check-payment-status', { reference: paymentRef });
          document.getElementById('status-msg').textContent = 'Status: ' + res.status;
          if (res.status === 'success' && res.token) {
            clearInterval(timer);
            localStorage.setItem('token', res.token);
            window.location.href = '/dashboard';
          }
        } catch (_) {}
      }, 5000);
    }
  </script>
</body>
</html>
