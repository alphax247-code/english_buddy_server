<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Return – English Buddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="hero">
    <div class="card text-center">
      <div id="icon" style="font-size:3rem; margin-bottom:1rem;">⏳</div>
      <h1 id="title">A verificar pagamento…</h1>
      <p class="text-muted" id="subtitle">Aguarde enquanto confirmamos o seu pagamento.</p>
      <div class="spinner" id="spinner"></div>
      <div id="alert-box" class="mt-2"></div>
      <div id="actions" style="display:none; margin-top:1rem;">
        <a href="/dashboard" class="btn btn-primary btn-block mt-1">Go to Dashboard</a>
        <a href="/" class="btn btn-outline btn-block mt-1">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const reference = params.get('reference') || params.get('ref') || params.get('tx_ref') || '';

    async function checkPayment() {
      if (!reference) {
        setResult('error');
        return;
      }
      try {
        const res = await API.post('/api/register/check-payment-status', { reference });
        if (res.status === 'success') {
          setResult('success', res);
        } else if (res.status === 'pending') {
          setTimeout(checkPayment, 4000);
        } else {
          setResult('failed');
        }
      } catch (e) {
        setResult('error');
      }
    }

    function setResult(type, data) {
      const spinner = document.getElementById('spinner');
      const icon    = document.getElementById('icon');
      const title   = document.getElementById('title');
      const sub     = document.getElementById('subtitle');
      spinner.style.display = 'none';
      document.getElementById('actions').style.display = 'block';

      if (type === 'success') {
        icon.textContent = '✅';
        title.textContent = 'Pagamento Confirmado!';
        sub.textContent = 'A sua conta está ativa. A regressar ao English Buddy…';
        showAlert('alert-box', 'Pagamento confirmado. Bem-vindo ao English Buddy!', 'success');
        // Redirect back to the Flutter app via deep link
        setTimeout(() => {
          window.location.href = `englishbuddy://payment/registration?reference=${reference}`;
        }, 1500);
      } else if (type === 'failed') {
        icon.textContent = '❌';
        title.textContent = 'Pagamento Falhado';
        sub.textContent = 'O pagamento não foi concluído. Tente novamente.';
        showAlert('alert-box', 'Pagamento não completado.', 'danger');
      } else {
        icon.textContent = '⚠️';
        title.textContent = 'Algo correu mal';
        sub.textContent = 'Não foi possível verificar o pagamento. Contacte o suporte.';
        showAlert('alert-box', 'Não foi possível verificar o estado do pagamento.', 'warning');
      }
    }

    checkPayment();
  </script>
</body>
</html>
